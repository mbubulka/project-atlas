name: Test Suite & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Git LFS
      uses: nscooling/setup-git-lfs@v1

    - name: Git LFS Pull
      run: git lfs pull

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-benchmark pytest-timeout

    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --tb=short --timeout=30

    - name: Run RAG integration tests
      run: |
        pytest tests/ai_layer/test_rag_financial_advisor.py -v --tb=short --timeout=30

    - name: Run existing integration tests
      run: |
        pytest tests/integration/ -v --tb=short --timeout=30

    - name: Run financial accuracy tests
      run: |
        pytest tests/financial_accuracy/ -v --tb=short --timeout=30

    - name: Run edge case tests
      run: |
        pytest tests/edge_cases/ -v --tb=short --timeout=30

    - name: Run all tests with coverage
      run: |
        pytest tests/ -v --tb=short --timeout=30 --cov=src --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  performance:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Git LFS
      uses: nscooling/setup-git-lfs@v1

    - name: Git LFS Pull
      run: git lfs pull

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-benchmark pytest-timeout psutil

    - name: Run performance benchmarks
      run: |
        pytest tests/performance/ -v --tb=short --timeout=60

    - name: Save benchmark results
      run: |
        pytest tests/performance/ -v --tb=short --timeout=60 > performance_report.txt 2>&1 || true

    - name: Upload benchmark report
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: performance_report.txt

  coverage-report:
    runs-on: ubuntu-latest
    if: always()
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Git LFS
      uses: nscooling/setup-git-lfs@v1

    - name: Git LFS Pull
      run: git lfs pull

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Generate HTML coverage report
      run: |
        pytest tests/ --cov=src --cov-report=html --tb=short

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 85
        MINIMUM_ORANGE: 75
